
# #######################################################################################
# AUTOGENERATED HYPR CONFIG.
# PLEASE USE THE CONFIG PROVIDED IN THE GIT REPO /examples/hypr.conf AND EDIT IT,
# OR EDIT THIS ONE ACCORDING TO THE WIKI INSTRUCTIONS.
# #######################################################################################

#
# Please note not all available settings / options are set here.
# For a full list, see the wiki
#

# autogenerated = 1 # remove this line to remove the warning

# Source a file (multi-file configs)
# source = ~/.config/hypr/myColors.conf

# ----------------------------------------------------- 
# Monitor
# ----------------------------------------------------- 
source = ~/.config/hypr/conf/monitors/monitor.conf

# ----------------------------------------------------- 
# Autostart
# ----------------------------------------------------- 
source = ~/.config/hypr/conf/autostart.conf

# ----------------------------------------------------- 
# Cursor
# ----------------------------------------------------- 
source = ~/.config/hypr/conf/cursor.conf

# ----------------------------------------------------- 
# Environment
# ----------------------------------------------------- 
source = ~/.config/hypr/conf/environments/default.conf

# ----------------------------------------------------- 
# inputdevice
# ----------------------------------------------------- 
source = ~/.config/hypr/conf/inputdevice.conf

# ----------------------------------------------------- 
# Load color file
# ----------------------------------------------------- 
source=~/.config/hypr/mocha.conf

# ----------------------------------------------------- 
# Load configuration files
# ----------------------------------------------------- 
source = ~/.config/hypr/conf/workspaces/workspaces.conf
source = ~/.config/hypr/conf/windows/window.conf
# source = ~/.config/hypr/conf/decoration.conf
source = ~/.config/hypr/conf/layouts/layout.conf
# source = ~/.config/hypr/conf/misc.conf
source = ~/.config/hypr/conf/keybindings/mykeybinding.conf
source = ~/.config/hypr/conf/windowrules/windowrule.conf

# ----------------------------------------------------- 
# Animation
# ----------------------------------------------------- 
source = ~/.config/hypr/conf/animations/default.conf

general {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more

    gaps_in = 5
    gaps_out = 20
    border_size = 2
    # col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.active_border = $rosewater $flamingo $red
    col.inactive_border = rgba(595959aa)

    layout = dwindle

    # Please see https://wiki.hyprland.org/Configuring/Tearing/ before you turn this on
    allow_tearing = false
}

decoration {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more

    rounding = 10
    
    blur {
        enabled = true
        size = 3
        passes = 1
    }

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }
}

dwindle {
    # See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
    pseudotile = yes # master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = yes # you probably want this
}

master {
    # See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
    # new_is_master = true
}

########################################
# Hyprland gestures
# 新版手势语法：
# gesture = fingers, direction, action, options
########################################

# 1) 三指左右：切换 workspace
# 这是旧版 workspace_swipe 的主要替代
gesture = 3, horizontal, workspace

# 2) 四指捏合打开/关闭 special workspace
# 适合当 scratchpad 用
# 先自己准备一个 special workspace，比如 magic
gesture = 4, pinchin, special, magic
gesture = 4, pinchout, special, magic

# 3) 三指上划：切换当前窗口浮动/平铺
# 偶尔整理窗口时很顺手
gesture = 3, up, float

# 4) 三指下划 + SUPER：切换当前窗口全屏
# 加 SUPER 减少误触
gesture = 3, down, mod: SUPER, fullscreen

# 5) 四指左划 + SUPER：关闭当前窗口
# 危险操作建议一定带 mod
gesture = 4, left, mod: SUPER, close

# 6) 四指右划：移动当前窗口
# 用于快速拖动窗口布局
gesture = 4, right, move

# 7) 四指上划：调整当前窗口大小
gesture = 4, up, resize

# 8) 如果你想更快一点，可以给某个手势加 scale
# gesture = 3, horizontal, scale: 1.2, workspace

misc {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more
    force_default_wallpaper = -1 # Set to 0 or 1 to disable the anime mascot wallpapers
}

# Example per-device config
# See https://wiki.hyprland.org/Configuring/Keywords/#per-device-input-configs for more
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}

# GTK 使用 Catppuccin
env = GTK_THEME,Catppuccin-Mocha-Standard-Pink-Dark

# Qt 使用 Kvantum
env = QT_STYLE_OVERRIDE,kvantum

# Qt 配置工具
env = QT_QPA_PLATFORMTHEME,qt5ct
env = QT_QPA_PLATFORMTHEME,qt6ct

env = ELECTRON_OZONE_PLATFORM_HINT,wayland
