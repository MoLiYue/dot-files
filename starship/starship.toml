add_newline = false
command_timeout = 1000
scan_timeout = 30
palette = "catppuccin_mocha"

format = """
$username\
$hostname\
$directory\
$git_branch\
$git_status\
$python\
$nodejs\
$rust\
$golang\
$docker_context\
$kubernetes\
$character"""

[fill]
symbol = " "

# ---------- Catppuccin Mocha 调色板 ----------
[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo  = "#f2cdcd"
pink      = "#f5c2e7"
mauve     = "#cba6f7"
red       = "#f38ba8"
maroon    = "#eba0ac"
peach     = "#fab387"
yellow    = "#f9e2af"
green     = "#a6e3a1"
teal      = "#94e2d5"
sky       = "#89dceb"
sapphire  = "#74c7ec"
blue      = "#89b4fa"
lavender  = "#b4befe"
text      = "#cdd6f4"
subtext1  = "#bac2de"
subtext0  = "#a6adc8"
overlay2  = "#9399b2"
overlay1  = "#7f849c"
overlay0  = "#6c7086"
surface2  = "#585b70"
surface1  = "#45475a"
surface0  = "#313244"
base      = "#1e1e2e"
mantle    = "#181825"
crust     = "#11111b"

[username]
style_user = "bold mauve"
style_root = "bold red"
format = "[ $user]($style) "
show_always = true

[hostname]
ssh_only = true
style = "bold pink"
format = "[@$hostname]($style) "

[directory]
style = "bold blue"
truncation_length = 4
truncate_to_repo = false
read_only = " 󰌾"
format = "[ $path]($style)[$read_only]($read_only_style) "

[git_branch]
symbol = " "
style = "bold purple"
format = "[$symbol$branch]($style) "

[git_status]
style = "bold red"
format = '([\[$all_status$ahead_behind\]]($style) )'
conflicted = "="
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
up_to_date = ""
untracked = "?${count}"
stashed = "*${count}"
modified = "!${count}"
staged = "+${count}"
renamed = "»${count}"
deleted = "✘${count}"

[python]
symbol = " "
style = "yellow"
format = "[$symbol$version]($style) "
detect_extensions = ["py"]
detect_files = ["requirements.txt", "pyproject.toml", "uv.lock"]
detect_folders = [".venv", "venv"]

[nodejs]
symbol = " "
style = "green"
format = "[$symbol$version]($style) "

[rust]
symbol = " "
style = "red"
format = "[$symbol$version]($style) "

[golang]
symbol = " "
style = "cyan"
format = "[$symbol$version]($style) "

[docker_context]
symbol = " "
style = "blue"
format = "[$symbol$context]($style) "

[kubernetes]
disabled = false
symbol = "☸ "
style = "bold cyan"
format = '[$symbol$context( \($namespace\))]($style) '
detect_files = ["kubeconfig"]
detect_extensions = ["yaml", "yml"]

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
vimcmd_symbol = "[❮](bold green)"
