[mgr]
ratio          = [1, 3, 4]
sort_by        = "natural"
sort_sensitive = false
sort_reverse   = false
sort_dir_first = true
show_hidden    = true
show_symlink   = true
linemode       = "size"
scrolloff      = 5

[preview]
wrap        = "yes"
tab_size    = 2
max_width   = 1200
max_height  = 1800
image_delay = 30
image_filter = "triangle"
image_quality = 75

[tasks]
micro_workers    = 10
macro_workers    = 25
bizarre_retry    = 5
suppress_preload = false

[input]
cursor_blink = false
